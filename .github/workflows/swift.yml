name: Swift CI and Release

on:
  push:
    branches: [main, develop]
    tags:
      - "*.*.*"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-macos:
    name: Build and test
    runs-on: macos-14

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Swift
        uses: swift-actions/setup-swift@364295d9c23900ce04d4e5cc708387921b4e50f9 # v3
        with:
          swift-version: "5.9"

      - name: Cache Swift packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Tag must be a stable or prerelease SemVer without a v prefix: $RELEASE_TAG" >&2
            exit 1
          fi

          sdk_version=$(sed -n 's/.*static let version = "\([^"]*\)".*/\1/p' Sources/InsForge/InsForgeClient.swift)
          if [[ "$sdk_version" != "$RELEASE_TAG" ]]; then
            echo "Tag $RELEASE_TAG does not match SDK version $sdk_version" >&2
            exit 1
          fi

          if [[ "$RELEASE_TAG" != *-* ]]; then
            release_commit="$(git rev-parse "${RELEASE_TAG}^{commit}")"
            if ! git merge-base --is-ancestor "$release_commit" origin/main; then
              echo "Stable release $RELEASE_TAG must point to a commit contained in main." >&2
              exit 1
            fi
          fi

      - name: Build
        run: swift build -v

      - name: Run deterministic tests
        run: ./scripts/test-unit.sh

  lint:
    name: SwiftLint
    runs-on: macos-14

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: SwiftLint
        run: |
          brew install swiftlint
          swiftlint lint --strict

  build-documentation:
    name: Build Documentation
    runs-on: macos-14
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build DocC
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation --target InsForge \
            --output-path ./docs \
            --transform-for-static-hosting \
            --hosting-base-path insforge-swift

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

  release:
    name: Create stable GitHub Release
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    needs: [build-macos, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists"
          else
            gh release create "$RELEASE_TAG" --repo "$REPOSITORY" --generate-notes --verify-tag
          fi
